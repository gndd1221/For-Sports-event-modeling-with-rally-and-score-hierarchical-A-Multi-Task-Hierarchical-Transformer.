# 網球 (Tennis) 運動配置
sport: tennis

# --- 特徵定義 ---
features_to_extract:
  - roundscore_A
  - roundscore_B
  - gamescore_A
  - gamescore_B
  - player_id
  - opponent_id
  - type
  - backhand
  - location
  - spin
  - is_second_serve
  - is_tiebreak
  - set

categorical_features:
  - type
  - backhand
  - location
  - spin
  - is_second_serve
  - is_tiebreak

numerical_features:
  - roundscore_A
  - roundscore_B
  - gamescore_A
  - gamescore_B
  - set

embedding_dims:
  type: 16
  backhand: 8
  location: 16
  spin: 8
  is_second_serve: 4
  is_tiebreak: 4

# --- 預測任務 ---
targets:
  - type
  - backhand
  - location
  - spin

# --- Loss 權重 ---
loss_weights:
  type: 0.25
  backhand: 0.25
  location: 0.25
  spin: 0.25

# --- 階層配置 ---
hierarchy_levels:
  - L1
  - L2
  - L3
  - L4

# --- 序列長度上限 ---
max_shot_seq_len: 80
max_rally_seq_len: 50
max_game_seq_len: 15
max_set_seq_len: 5

# --- 資料路徑 ---
data_dir: data/tennis/Tennis_processed_data
config_file: data/tennis/Tennis_processed_data/config.json
results_dir: outputs/results/tennis

# 訓練超參數推薦值 (做為 train_.py 預設覆蓋)
training_args:
  epochs: 40
  batch_size: 64
  learning_rate: 0.0001
  label_smoothing: 0.1
  lambda_dist: 1.0
  grid_offset: 2
  use_distance_loss: false
  seed: 42
